<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Krakenote — Snap your notes. Crack the exam.">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ad4c6"/><stop offset="1" stop-color="#1a9d94"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22C3B6"/><stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22C3B6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22C3B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7B61FF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Abyss background -->
  <rect width="1200" height="630" fill="#0A1A2F"/>
  <!-- teal → violet glow feel -->
  <ellipse cx="1010" cy="120" rx="460" ry="420" fill="url(#glowTeal)"/>
  <ellipse cx="180" cy="600" rx="480" ry="440" fill="url(#glowViolet)"/>

  <!-- wordmark + tagline -->
  <g font-family="'Poppins','Segoe UI',system-ui,-apple-system,Roboto,sans-serif">
    <text x="90" y="200" font-size="34" font-weight="600" letter-spacing="1" fill="#22C3B6">iOS &amp; WEB · AI-POWERED</text>
    <text x="88" y="300" font-size="96" font-weight="800" letter-spacing="-3" fill="#F7F4ED">Snap your notes.</text>
    <text x="88" y="408" font-size="96" font-weight="800" letter-spacing="-3" fill="url(#accent)">Crack the exam.</text>
    <text x="90" y="486" font-size="34" font-weight="500" fill="#c4d1de" font-family="'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif">Instant AI flashcards, quizzes &amp; a tutor — from any page.</text>
    <text x="90" y="566" font-size="40" font-weight="800" letter-spacing="-1" fill="#F7F4ED">Krakenote</text>
  </g>

  <!-- kraken mascot -->
  <g transform="translate(1000 300) scale(1.7) translate(-100 -100)">
    <g fill="url(#kg)">
      <path d="M60 120 C40 140 34 168 46 182 C54 172 58 156 66 148 Z"/>
      <path d="M78 130 C70 156 58 172 66 188 C78 176 84 156 90 142 Z"/>
      <path d="M100 134 C98 160 96 178 108 188 C116 174 114 152 112 138 Z"/>
      <path d="M122 130 C134 152 138 172 132 188 C120 176 114 156 110 142 Z"/>
      <path d="M140 120 C160 140 166 166 154 182 C146 172 142 156 134 148 Z"/>
    </g>
    <path d="M100 26 C58 26 34 56 34 92 C34 122 56 140 100 140 C144 140 166 122 166 92 C166 56 142 26 100 26 Z" fill="url(#kg)"/>
    <g stroke="#0A1A2F" stroke-width="5" fill="#F7F4ED">
      <circle cx="78" cy="86" r="20"/>
      <circle cx="124" cy="86" r="20"/>
      <path d="M98 86 h6" fill="none"/>
    </g>
    <circle cx="80" cy="88" r="7" fill="#0A1A2F"/>
    <circle cx="122" cy="88" r="7" fill="#0A1A2F"/>
    <circle cx="83" cy="85" r="2.4" fill="#fff"/>
    <circle cx="125" cy="85" r="2.4" fill="#fff"/>
    <path d="M86 112 Q100 124 114 112" stroke="#0A1A2F" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <g transform="rotate(38 158 150)">
      <rect x="150" y="120" width="10" height="46" rx="2" fill="#FF6B5C"/>
      <polygon points="150,120 160,120 155,108" fill="#F7F4ED"/>
      <polygon points="153,112 157,112 155,108" fill="#0A1A2F"/>
      <rect x="150" y="160" width="10" height="7" fill="#F4B740"/>
    </g>
  </g>
</svg>
